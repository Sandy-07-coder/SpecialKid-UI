<style>
        body {
            background: linear-gradient(135deg, #f0f3ff 0%, #e1e0ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .chunky-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
        }

        .chunky-card:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        .chunky-card-yellow {
            border-bottom: 6px solid #b79b00;
        }
        .chunky-card-blue {
            border-bottom: 6px solid #2e2bc2;
        }
        .chunky-card-purple {
            border-bottom: 6px solid #6f5c00; /* Using secondary darker variant */
            border-bottom-color: #3b3bbb;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
            font-size: 80px;
        }

        .floating-mascot {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .ripple-animation {
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>

<body class="flex flex-col font-body-lg text-on-surface">

<!-- Cards Section (Bento/Tactile Grid) -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-gutter w-full max-w-6xl">
<!-- Card 1: Tap Mode -->

<script>
        function handleSelection(mode) {
            const feedback = document.getElementById('feedback-mascot');
            const text = document.getElementById('feedback-text');
            
            text.innerText = `${mode} Activated! Let's go!`;
            feedback.classList.remove('hidden');
            
            // Interaction feedback
            console.log(`User selected ${mode} mode.`);
            
            setTimeout(() => {
                feedback.classList.add('hidden');
            }, 3000);
        }

        // Add a small mouse tracking effect for the robot
        document.addEventListener('mousemove', (e) => {
            const mascot = document.querySelector('.floating-mascot');
            if (mascot) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                mascot.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
    </script>
