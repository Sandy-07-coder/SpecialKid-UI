<!-- Micro-interactions Script -->
<script>
        // Simple interactive script for visual feedback
        const micBtn = document.querySelector('.chunky-button');
        const statusText = document.querySelector('.animate-pulse');
        let isListening = true;

        micBtn.addEventListener('click', () => {
            isListening = !isListening;
            if (isListening) {
                statusText.innerText = '...Listening to your voice...';
                statusText.classList.add('animate-pulse');
                micBtn.style.backgroundColor = '';
            } else {
                statusText.innerText = 'Click to speak again';
                statusText.classList.remove('animate-pulse');
                micBtn.style.backgroundColor = '#767586'; // Greyed out inactive state
            }
        });
    </script>
