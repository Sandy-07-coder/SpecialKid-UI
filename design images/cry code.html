<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .kinetic-shadow {
            box-shadow: 0px 8px 0px rgba(42, 43, 81, 0.05);
        }
        .active-button-press:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px transparent;
        }
    </style>

<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- TopNavBar -->
<nav class="w-full top-0 px-6 py-4 bg-[#f8f5ff] dark:bg-slate-950 flex justify-between items-center z-50">
<div class="flex items-center gap-2">
<div class="hidden"></div>
</div>
<div class="flex items-center gap-4">
<button class="text-[#575881] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
</button>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling child with bright expressive eyes in soft natural indoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKA2PCFr6743G857rCEpEK5Dk2Nn-odO_nDH0m0SfVg35Dbwx_DpQjUf14cGd2RPEiIVZGTMN3nInGJZMSEFB2UaZd_bfxPqx61CvffBhDR6I4lcr8Trn3KUNroq9E8_t4qUw0IIQkKqiPMkCmqkOwsq4TtUXrs1T8VKzdCxvehJ8EnET02xkfEoiE-_4NppWV3e_UPAFBetU2OD_nAsVob49P7e8EKLQbDKDwBhHIM_GWjb7nkKSAORyVHuk2WXj_xsT9TQdKH_4W"/>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col relative px-6">
<!-- Animated Background Elements (Subtle) -->
<div class="absolute top-20 left-10 w-32 h-32 bg-surface-container-low rounded-full blur-3xl opacity-60 pointer-events-none"></div>
<div class="absolute bottom-40 right-10 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl opacity-40 pointer-events-none"></div>
<!-- Headline -->
<div class="text-center pt-8 mb-4">
<h1 class="text-[2.5rem] md:text-[3.5rem] font-extrabold tracking-tight text-on-surface leading-tight">How is your <span style="color: #2962FF;">mood</span> today?</h1>
</div>
<!-- Focused Interactive Area: Perfectly Centered -->
<div class="flex-1 flex items-center justify-center w-full -mt-16">
<div class="flex flex-col md:flex-row items-center justify-center gap-12 md:gap-24">
<!-- Sad Robot Image (15-20% larger than original w-64/w-80) -->
<div class="relative group">
<img alt="Sad robot" class="w-[300px] md:w-[420px] h-auto transform rotate-2 transition-transform duration-500 hover:rotate-0" data-alt="Sad robot looking right" src="https://lh3.googleusercontent.com/aida/ADBb0ujhN4PlIkcQ2DcuLQSPKNONSQU74AORF63YsTBpmqBQDZPuCE97Dw9BE_zQsxSdmAJcOecea9-D58Dkgq26B8fMVR-PZjXMPDsY8hpVVG_V9HwUHof80uT_XE1ed99ZYsFV8THdbAtatPItS_Tz50NvERwfIaJ29DFYibZKo2AQfGk3bJ-0jbwlaX4iWcCxnNt9YQJn-skC3pWQ-tvozx-Au_Jen8hzSvFDVQH2lbLeQMq8MAPT9LIFS44"/>
</div>
<!-- Sad Mood Button: Large Pill Shape -->
<button class="active-button-press group flex items-center gap-4 px-12 py-6 bg-surface-container-highest rounded-full border-b-[8px] border-primary-dim hover:bg-surface-container-high transition-colors">
<span class="text-4xl md:text-6xl">😢</span>
<span class="text-4xl md:text-6xl font-bold tracking-tight text-primary-dim">Sad</span>
</button>
</div>
</div>
<!-- Space for Bottom Nav -->
<div class="h-32"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center gap-12 items-center px-6 pb-8 pt-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-10px_40px_rgba(42,43,81,0.1)] rounded-t-[3rem] border-t-0">
<!-- Mood Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-[#dbd9ff] dark:bg-blue-900/30 text-[#2962FF] rounded-full px-8 py-2 transition-all duration-300 active:translate-y-1" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="mood" style="font-variation-settings: 'FILL' 1;">mood</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[12px] mt-1">Mood</span>
</a>
<!-- History Tab (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#575881] dark:text-slate-400 px-8 py-2 hover:bg-[#f2efff] dark:hover:bg-slate-800 rounded-full transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[12px] mt-1">History</span>
</a>
</nav>
